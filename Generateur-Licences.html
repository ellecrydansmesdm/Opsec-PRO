<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opsec PRO - Générateur de Licences</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #1a1a1a; padding: 30px; border-radius: 10px; border: 1px solid #333; width: 400px; box-shadow: 0 0 20px rgba(0,255,255,0.1); }
        h1 { color: #00ffff; text-align: center; margin-top: 0; }
        label { display: block; margin: 15px 0 5px; color: #aaa; }
        input, select, button, textarea { width: 100%; padding: 10px; box-sizing: border-box; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; margin-bottom: 15px; }
        button { background: #00ffff; color: #000; font-weight: bold; cursor: pointer; border: none; font-size: 16px; transition: 0.2s; }
        button:hover { background: #00cccc; }
        button:disabled { background: #555; cursor: not-allowed; }
        textarea { height: 150px; resize: none; font-family: monospace; }
        .info { font-size: 12px; color: #888; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Opsec Générateur</h1>
        
        <label>Quantité de clés à générer :</label>
        <input type="number" id="amount" value="50" min="1" max="1000">
        
        <label>Durée de la licence :</label>
        <select id="duration">
            <option value="30">Mensuel (30 jours)</option>
            <option value="365">Annuel (365 jours)</option>
            <option value="lifetime">À vie (Lifetime)</option>
        </select>
        
        <button onclick="generate()">Générer & Sauvegarder Firebase</button>
        
        <label>Clés générées (à coller dans Sell.app) :</label>
        <textarea id="output" placeholder="Les clés apparaîtront ici..." readonly></textarea>
        
        <div class="info">Base de données : opsec-auth-default-rtdb</div>
    </div>

    <script>
        const FIREBASE_URL = "https://opsec-auth-default-rtdb.firebaseio.com/licenses.json";

        function randomString(length) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let result = '';
            for (let i = 0; i < length; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        async function generate() {
            const amount = parseInt(document.getElementById('amount').value);
            const duration = document.getElementById('duration').value;
            const btn = document.querySelector('button');
            
            btn.innerText = "Génération en cours...";
            btn.disabled = true;

            const keysList = [];
            const firebasePayload = {};

            for (let i = 0; i < amount; i++) {
                const key = "OPSEC-" + randomString(4) + "-" + randomString(4) + "-" + randomString(4);
                keysList.push(key);
                
                firebasePayload[key] = {
                    status: "active",
                    hwid: "",
                    createdAt: Date.now(),
                    durationDays: duration === "lifetime" ? "lifetime" : parseInt(duration)
                };
            }

            try {
                // PATCH request merges new data instead of deleting existing keys
                const res = await fetch(FIREBASE_URL, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(firebasePayload)
                });

                if (res.ok) {
                    document.getElementById('output').value = keysList.join('\n');
                    alert(amount + " clés ont été créées et sauvegardées avec succès sur Firebase !");
                } else {
                    alert("Erreur lors de la sauvegarde : Vérifiez les règles de la base de données (" + res.status + ")");
                }
            } catch (err) {
                alert("Erreur de connexion : " + err.message);
            }

            btn.innerText = "Générer & Sauvegarder Firebase";
            btn.disabled = false;
        }
    </script>
</body>
</html>
